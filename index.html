<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Math in JavaScript</title>
    <link rel="stylesheet" href="JSCALCU.css">
</head>
<body>

<h2>Math in JavaScript</h2>

<div class="container">

    <div class="row">
        First Number:
        <input type="number" id="num1">

        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>

        Second Number:
        <input type="number" id="num2">
    </div>

    <div class="row">
        <button onclick="calculate()">Solve</button>
    </div>

    <div id="result"></div>

</div>

<script src="JSCALCU.js"></script>
</body>
</html>
