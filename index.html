<!DOCTYPE html>
<html>
<head>
    <title>Math in JavaScript</title>

    <!-- Link to external CSS -->
    <link rel="stylesheet" href="JSCALCU.css">
</head>
<body>

<h2>Math in JavaScript</h2>

<div class="calculator">

    <div class="row">
        <label for="num1">First Number:</label>
        <input type="number" id="num1">

        <!-- Operator dropdown without label -->
        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>

        <label for="num2">Second Number:</label>
        <input type="number" id="num2">
    </div>

    <div class="row">
        <button id="solveBtn">Solve</button>
    </div>

    <!-- Result initially empty -->
    <div id="result"></div>

</div>

<!-- Link to external JS -->
<script src="JSCALCU.js"></script>

</body>
</html>
