<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math in JavaScript</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="JSCALCU.css">
</head>
<body>

<div class="container d-flex justify-content-center mt-5">
    <div class="card p-4 shadow-sm auto-card">

        <h4 class="mb-4">Math in JavaScript</h4>

        <!-- Main Row -->
        <div class="calculator-row">

            <!-- First Number Section -->
            <div class="first-section">
                <label class="form-label">First Number:</label>
                <input type="number" id="firstNumber" class="form-control small-input">

                <!-- Solve Button BELOW First Number -->
                <button class="btn btn-primary mt-3" onclick="calculate()">Solve</button>
            </div>

            <!-- Operator -->
            <div class="operator-section">
                <label class="form-label">Operator</label>
                <select id="operator" class="form-select operator-select">
                    <option value="+">+</option>
                    <option value="-">-</option>
                    <option value="*">*</option>
                    <option value="/">/</option>
                </select>
            </div>

            <!-- Second Number -->
            <div>
                <label class="form-label">Second Number:</label>
                <input type="number" id="secondNumber" class="form-control small-input">
            </div>

        </div>

        <!-- Result -->
        <div class="mt-4">
            <h5 id="result" class="result-text"></h5>
        </div>

    </div>
</div>

<script>
function calculate() {
    let first = document.getElementById("firstNumber").value;
    let second = document.getElementById("secondNumber").value;
    let operator = document.getElementById("operator").value;
    let resultElement = document.getElementById("result");

    if (first === "" || second === "") {
        resultElement.innerHTML = "";
        return;
    }

    first = parseFloat(first);
    second = parseFloat(second);

    let result;

    switch(operator) {
        case "+":
            result = first + second;
            break;
        case "-":
            result = first - second;
            break;
        case "*":
            result = first * second;
            break;
        case "/":
            result = second === 0 ? "Cannot divide by zero" : first / second;
            break;
        default:
            result = "Invalid operator";
    }

    resultElement.innerHTML = "Result: " + result;
}
</script>

</body>
</html>
