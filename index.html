<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math in JavaScript</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="JSCALCU.css">
</head>
<body>

<div class="container d-flex justify-content-center mt-5">
    <div class="card p-4 shadow-sm auto-card">

        <h4 class="mb-4 text-center">Math in JavaScript</h4>

        <!-- Main Row -->
        <div class="row g-3 align-items-start">

            <!-- First Number + Solve button for large screens -->
            <div class="col-12 col-md-4 d-flex flex-column">
                <label class="form-label">First Number:</label>
                <input type="number" id="firstNumber" class="form-control mt-1">

                <!-- Solve button (large screens) -->
                <div class="d-none d-md-block mt-3">
                    <button class="btn btn-primary w-50" onclick="calculate()">Solve</button>
                    <h5 id="resultLarge" class="result-text mt-2"></h5>
                </div>
            </div>

            <!-- Operator -->
            <div class="col-12 col-md-4 d-flex flex-column">
                <label class="form-label">Operator</label>
                <select id="operator" class="form-select mt-1">
                    <option value="+">+</option>
                    <option value="-">-</option>
                    <option value="*">*</option>
                    <option value="/">/</option>
                </select>
            </div>

            <!-- Second Number -->
            <div class="col-12 col-md-4 d-flex flex-column">
                <label class="form-label">Second Number:</label>
                <input type="number" id="secondNumber" class="form-control mt-1">
            </div>

        </div>

        <!-- Solve button for small screens (bottom) -->
        <div class="mt-4 text-center d-block d-md-none">
            <button class="btn btn-primary w-50" onclick="calculate()">Solve</button>
            <h5 id="resultSmall" class="result-text mt-2"></h5>
        </div>

    </div>
</div>

<script>
function calculate() {
    let first = document.getElementById("firstNumber").value;
    let second = document.getElementById("secondNumber").value;
    let operator = document.getElementById("operator").value;

    let result;

    if (first === "" || second === "") {
        result = "";
    } else {
        first = parseFloat(first);
        second = parseFloat(second);

        switch(operator) {
            case "+": result = first + second; break;
            case "-": result = first - second; break;
            case "*": result = first * second; break;
            case "/": result = second === 0 ? "Cannot divide by zero" : first / second; break;
            default: result = "Invalid operator";
        }
    }

    // Display result in both places
    document.getElementById("resultLarge").innerHTML = "Result: " + result;
    document.getElementById("resultSmall").innerHTML = "Result: " + result;
}
</script>

</body>
</html>
